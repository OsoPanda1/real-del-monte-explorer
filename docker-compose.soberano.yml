version: '3.8'

services:
  rdm-reverse-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rdm-kernel-api
    networks:
      - rdm-mesh

  rdm-db-spatial:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: anubis_admin
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: rdm_digital_os
    volumes:
      - rdm-pg-data:/var/lib/postgresql/data
    networks:
      - rdm-mesh

  rdm-event-bus:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - rdm-redis-data:/data
    networks:
      - rdm-mesh

  rdm-kernel-api:
    build:
      context: ./src/kernel
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://anubis_admin:${DB_PASS}@rdm-db-spatial:5432/rdm_digital_os
      - REDIS_URL=redis://rdm-event-bus:6379
      - EDGE_MODE=SOVEREIGN
    depends_on:
      - rdm-db-spatial
      - rdm-event-bus
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    networks:
      - rdm-mesh

volumes:
  rdm-pg-data:
  rdm-redis-data:

networks:
  rdm-mesh:
    driver: bridge
