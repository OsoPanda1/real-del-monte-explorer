name: Frontend Go Green

on:
  push:
    branches: ["main", "master", "work"]
  pull_request:
    branches: ["main", "master", "work"]

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-frontend
          path: dist
